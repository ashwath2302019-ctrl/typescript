<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Task Tracker</h1>
        
    </header>

    <main>

        <section>
            <h2>Add New Task</h2>

            <form id="f">
                <div>
                    <label for="int">Task Name:</label>
                    <input 
                        type="text" 
                        id="int" 
                        name="taskName" 
                        placeholder="Enter task name" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="priority">Priority:</label>
                    <select id="priority" name="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <br>

                <div>
                    <label for="dt">Due Date:</label>
                    <input 
                        type="date" 
                        id="dt" 
                        name="dueDate" 
                        required
                    >
                </div>

                <br>

                <button type="submit">Add Task</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Task Controls</h2>

            <div>
                <button type="button" id="filter-all">All</button>
                <button type="button" id="filter-pending">Pending</button>
                <button type="button" id="filter-done">Done</button>
            </div>

            <br>

            <div>
                <label for="sort-by">Sort Tasks:</label>
                <select id="sort-by" name="sortBy">
                    <option value="">None</option>
                    <option value="priority">By Priority</option>
                    <option value="dueDate">By Due Date</option>
                </select>
            </div>

            <p id="counter">Showing 0 of 0 tasks</p>
        </section>

        <hr>

        <section>
            <h2>Task List</h2>

            <ul id="task-list"></ul>

            <button type="button" id="clear-all">Clear All</button>
        </section>

        <hr>

        <section>
            <h2>Task Table</h2>

            <table>
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="t2">
                </tbody>
            </table>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Task Tracker</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
