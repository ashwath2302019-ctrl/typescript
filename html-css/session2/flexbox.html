<!-- /*
flex-grow controls how much extra free space a flex item should take.
If all items have flex-grow: 1, they share the extra space equally.
If one item has flex-grow: 2, it takes twice as much extra space as an item with flex-grow: 1.
If one item has flex-grow: 3, it takes three times more extra space compared to flex-grow: 1.
*/ -->
